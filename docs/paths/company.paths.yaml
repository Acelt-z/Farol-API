/company:
  post:
    summary: Create a new company
    tags: [Company]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/company.schema.yaml#/CreateCompanyRequest"
    responses:
      201:
        description: Company created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "../schemas/company.schema.yaml#/CompanyResponse"

/company/{companyId}:
  patch:
    summary: Update company basic information
    tags: [Company]
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: companyId
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/company.schema.yaml#/UpdateCompanyRequest"
    responses:
      200:
        description: Company updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "../schemas/company.schema.yaml#/CompanyResponse"

/company/{parentCompanyId}/branch:
  post:
    summary: Create a branch for a parent company
    tags: [Company]
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: parentCompanyId
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/company.schema.yaml#/CreateCompanyRequest"
    responses:
      201:
        description: Branch created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "../schemas/branch.schema.yaml#/BranchResponse"
